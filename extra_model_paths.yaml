# Modeles servis depuis le network volume RunPod (monte en /runpod-volume en
# serverless ; c'est le meme volume que /workspace sur les pods manuels).
runpod_volume:
  base_path: /runpod-volume/ComfyUI
  checkpoints: models/checkpoints
  clip: models/clip
  clip_vision: models/clip_vision
  configs: models/configs
  controlnet: models/controlnet
  diffusion_models: |
    models/diffusion_models
    models/unet
  embeddings: models/embeddings
  loras: models/loras
  text_encoders: models/text_encoders
  upscale_models: models/upscale_models
  vae: models/vae
  sams: models/sams
  ultralytics: models/ultralytics
  ultralytics_bbox: models/ultralytics/bbox
  ultralytics_segm: models/ultralytics/segm
  detection: models/detection
  LLM: models/LLM
  llm_gguf: models/llm_gguf
  rife: models/rife
